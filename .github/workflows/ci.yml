name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the checkout; it never writes to the repo,
# creates releases, or comments. Override per-job if a future job needs more.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. a force-push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 22]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - if: matrix.node == 22
        run: pnpm run typecheck:all
      - if: matrix.node == 22
        run: pnpm test
      - run: pnpm run build
      - if: matrix.node == 18
        run: node --input-type=module -e "await import('./dist/core/index.js'); await import('./dist/core/proxy.js')"
      - if: matrix.node == 22
        run: pnpm run test:restart
      - if: matrix.node == 22
        run: pnpm run test:package
      - if: matrix.node == 22
        run: pnpm run test:worker
