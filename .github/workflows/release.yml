name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release # must match the npm Trusted Publisher config
    steps:
      # Pinned to full-length commit SHAs (audit finding E6) to remove the
      # mutable-tag supply-chain risk.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # Audit finding E6: the pushed tag must equal package.json version, else
      # we'd publish under the wrong name/version.
      - name: Verify tag matches version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME}
          if [ "v$VERSION" != "$TAG" ]; then
            echo "tag $TAG does not match version v$VERSION" >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      # Skip if this version is already on the registry (idempotent re-runs)
      - name: Check version not already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already published - skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      # prepublishOnly runs typecheck + tests + build as the gate
      # Auth via npm Trusted Publisher (OIDC) - no token needed.
      # Requires npm >= 11.5; Node 22 ships older, so upgrade npm first.
      - if: steps.check.outputs.skip == 'false'
        run: |
          npm install -g npm@latest
          npm publish --access public --provenance
