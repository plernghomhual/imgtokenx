onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd

# Supply-chain hardening: refuse to install any package version published
# less than 3 days ago. Catches the typical malicious-package lifecycle
# (publish → discovered → unpublished within hours/days). Legitimate
# security patches also wait 3 days; that's a deliberate trade-off for a
# repo we update manually.
# NOTE: this yaml is the ONLY place pnpm reads these settings from — a
# previous audit pass parked them in a `.pnpmrc` file, which pnpm does not
# read at all (its config chain is .npmrc + pnpm-workspace.yaml).
minimumReleaseAge: 4320  # minutes (= 3 days)
# @cloudflare/* (workers-types, wrangler's engine deps) iterate faster than
# the 3-day window — exclude so Workers tooling updates aren't blocked.
# https://pnpm.io/settings#minimumreleaseageexclude
minimumReleaseAgeExclude:
  - "@cloudflare/*"
# Don't apply .pnpmfile.cjs overrides. We don't ship one today; belt-and-braces
# lockout so a future pnpmfile can't quietly rewrite dependency semantics.
ignorePnpmfile: true

# Security floors for transitive deps (CVE-patched minimums). Lives here, not
# in package.json `pnpm.overrides` — pnpm >10.21 ignores that field ("no longer
# read by pnpm" warning) while this yaml is read by both old and new pnpm.
overrides:
  "ws@>=8.0.0 <8.20.1": ^8.20.1
  "vite@>=8.0.0 <8.0.16": ^8.0.16
  "undici@>=7.0.0 <7.28.0": ^7.28.0
  "esbuild@>=0.27.3 <0.28.1": ^0.28.1
